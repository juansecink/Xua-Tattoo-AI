<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xua Tattoo AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:95%;
max-width:420px;
background:#1b1b1b;
padding:25px;
border-radius:18px;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#bdbdbd;
margin-bottom:20px;
}

input[type=file]{
width:100%;
margin-bottom:20px;
}

textarea{
width:100%;
height:90px;
background:#2a2a2a;
border:none;
color:white;
padding:12px;
border-radius:10px;
resize:none;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
background:#00c8ff;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#preview{
margin-top:20px;
text-align:center;
}

#preview img{
max-width:100%;
border-radius:12px;
}
</style>

</head>

<body>

<div class="card">

<h1>🖤 Xua Tattoo AI</h1>

<p>Tu asistente inteligente para tatuajes</p>

<input type="file" id="image">

<textarea placeholder="Ejemplo: Saca el esténcil con líneas gruesas y puntillismo"></textarea>

<button onclick="previewImage()">Procesar</button>

<div id="preview"></div>

</div>

<script>
function previewImage(){

let file=document.getElementById("image").files[0];

if(!file){
alert("Selecciona una imagen");
return;
}

let reader=new FileReader();

reader.onload=function(e){

document.getElementById("preview").innerHTML=
"<h3>Vista previa</h3><br><img src='"+e.target.result+"'>";

}

reader.readAsDataURL(file);

}
</script>

</body>
</html>
