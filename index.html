<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:500px;
background:#151515;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.08);
}

h1{
text-align:center;
font-size:32px;
margin-bottom:10px;
}

p{
text-align:center;
color:#aaa;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
background:#222;
color:white;
border-radius:10px;
border:1px solid #333;
}

img{
width:100%;
margin-top:20px;
border-radius:15px;
}

textarea{
width:100%;
height:90px;
margin-top:15px;
padding:12px;
background:#222;
color:white;
border-radius:10px;
border:1px solid #333;
resize:none;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#ffffff;
color:#000;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ccc;
}

</style>

</head>

<body>

<div class="card">

<h1>🖤 Xua Tattoo AI</h1>

<p>Asistente IA para tatuadores profesionales</p>

<input type="file" id="image" accept="image/*">

<img id="preview" style="display:none;">

<textarea id="prompt" placeholder="
Ejemplo:
- Crear esténcil
- Líneas más gruesas
- Sombras en puntos
- Preparar para termocopiadora"></textarea>

<button onclick="previewImage()">👁 Vista previa</button>

<button onclick="stencil()">✏️ Crear esténcil</button>
