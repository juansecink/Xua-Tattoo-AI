<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xua Tattoo AI</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
}

header{
  padding:20px;
}

h1{
  font-size:32px;
}

.container{
  padding:20px;
}

input,button{
  margin:10px;
  padding:12px;
  border-radius:8px;
  border:none;
}

button{
  background:white;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

canvas{
  display:none;
}

#preview{
  max-width:90%;
  margin-top:20px;
  border:2px solid white;
}
</style>

</head>

<body>

<header>
<h1>🔥 Xua Tattoo AI 🔥</h1>
<p>Generador de esténciles para tatuajes</p>
</header>

<div class="container">

<input type="file" id="upload" accept="image/*">

<br>

<button onclick="createStencil()">
Crear Esténcil
</button>

<br>

<img id="preview">

<br>

<button onclick="downloadImage()">
Descargar Esténcil
</button>

</div>


<canvas id="canvas"></canvas>


<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let img=document.getElementById("preview");


document.getElementById("upload").onchange=function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(event){

img.src=event.target.result;

}

reader.readAsDataURL(file);

}



function createStencil(){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let data=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

for(let i=0;i<data.data.length;i+=4){

let avg=
(data.data[i]+
data.data[i+1]+
data.data[i+2])/3;


let value=avg<150?0:255;


data.data[i]=value;
data.data[i+1]=value;
data.data[i+2]=value;

}

ctx.putImageData(data,0,0);

showResult();

}

}



function showResult(){

img.src=canvas.toDataURL();

img.style.display="block";

}



function downloadImage(){

let link=document.createElement("a");

link.download="Xua_Tattoo_AI_Estencil.png";

link.href=canvas.toDataURL();

link.click();

}


</script>

</body>
</html>
