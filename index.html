<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xua Tattoo AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

<body>

<div class="card">

<h1>🖤 Xua Tattoo AI</h1>

<p>Asistente IA para tatuadores</p>

<input type="file" id="image" accept="image/*">

<img id="preview" style="display:none;width:100%;margin-top:15px;border-radius:10px;">

<textarea id="prompt"
placeholder="Ejemplo:
• Saca el esténcil
• Engrosa las líneas
• Convierte las sombras a puntillismo"></textarea>

<button onclick="previewImage()">Vista previa</button>

<button>Sacar esténcil</button>

<button>Engrosar líneas</button>

<button>Puntillismo</button>

<button>Mejorar calidad</button>

</div>

<script>

function previewImage(){

const file=document.getElementById("image").files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

const img=document.getElementById("preview");

img.src=e.target.result;

img.style.display="block";

}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
