<body>


<h1>XUA TATTOO AI</h1>

<div class="sub">
BLACKLETTER STENCIL STUDIO
</div>



<div class="app">


<div class="panel">


<h3>📂 Cargar Diseño</h3>

<input type="file" id="foto" accept="image/*">


</div>



<div class="panel">


<h3>⚔ Herramientas</h3>


<button id="crear">
🖊 CREAR ESTÉNCIL
</button>


<button id="limpiar">
🧹 RESTAURAR
</button>


<button id="invertir">
🔄 INVERTIR
</button>


<button id="descargar">
💾 GUARDAR PNG
</button>


</div>



<canvas id="canvas"></canvas>


</div>





<script>


const canvas=document.getElementById("canvas");

const ctx=canvas.getContext("2d");


let imagen=new Image();

let original=null;





document.getElementById("foto").addEventListener("change",function(e){


let lector=new FileReader();


lector.onload=function(){


imagen.onload=function(){


canvas.width=imagen.width;

canvas.height=imagen.height;


ctx.drawImage(imagen,0,0);



original=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);



};



imagen.src=lector.result;


};



lector.readAsDataURL(e.target.files[0]);


});







document.getElementById("crear").addEventListener("click",function(){


if(!original){

alert("Carga un tatuaje primero");

return;

}



let datos=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);



for(let i=0;i<datos.data.length;i+=4){


let gris=(

datos.data[i]+
datos.data[i+1]+
datos.data[i+2]

)/3;



if(gris<150){


datos.data[i]=0;
datos.data[i+1]=0;
datos.data[i+2]=0;


}else{


datos.data[i]=255;
datos.data[i+1]=255;
datos.data[i+2]=255;


}


}



ctx.putImageData(datos,0,0);



alert("Esténcil creado");


});
