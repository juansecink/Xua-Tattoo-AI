<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI</title>

<style>
body{
background:#080808;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:#151515;
padding:20px;
border-radius:20px;
}

button{
padding:12px;
margin:5px;
border-radius:10px;
border:none;
font-weight:bold;
}

canvas{
max-width:100%;
background:white;
margin-top:20px;
}
</style>

</head>

<body>

<h1>🔥 Xua Tattoo AI 🔥</h1>

<div class="box">

<input type="file" id="foto" accept="image/*">

<br>

<button id="stencil">CREAR ESTÉNCIL</button>
<button id="reset">LIMPIAR</button>
<button id="invertir">INVERTIR</button>
<button id="download">DESCARGAR</button>

<canvas id="canvas"></canvas>

</div>


<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let imagen=new Image();
let guardado=null;


document.getElementById("foto").onchange=function(e){

let lector=new FileReader();

lector.onload=function(){

imagen.onload=function(){

canvas.width=imagen.width;
canvas.height=imagen.height;

ctx.drawImage(imagen,0,0);

guardado=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

};

imagen.src=lector.result;

};

lector.readAsDataURL(e.target.files[0]);

};



document.getElementById("stencil").onclick=function(){

if(!guardado){
alert("Carga una imagen primero");
return;
}


let datos=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


for(let i=0;i<datos.data.length;i+=4){

let gris=
(
datos.data[i]+
datos.data[i+1]+
datos.data[i+2]
)/3;


if(gris<140){

datos.data[i]=0;
datos.data[i+1]=0;
datos.data[i+2]=0;

}else{

datos.data[i]=255;
datos.data[i+1]=255;
datos.data[i+2]=255;

}


}


ctx.putImageData(datos,0,0);

alert("Esténcil creado");

};



document.getElementById("reset").onclick=function(){

if(guardado){

ctx.putImageData(
guardado,
0,
0
);

}

};



document.getElementById("invertir").onclick=function(){

let datos=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


for(let i=0;i<datos.data.length;i+=4){

datos.data[i]=255-datos.data[i];
datos.data[i+1]=255-datos.data[i+1];
datos.data[i+2]=255-datos.data[i+2];

}


ctx.putImageData(datos,0,0);

};



document.getElementById("download").onclick=function(){

let a=document.createElement("a");

a.download="Xua_Tattoo_AI.png";

a.href=canvas.toDataURL();

a.click();

};


</script>

</body>
</html>
