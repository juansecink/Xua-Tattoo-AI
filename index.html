<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI 2.0</title>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>

body{
background:#080808;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
padding:20px;
}

h1{
font-size:32px;
}

.app{
max-width:600px;
margin:auto;
background:#151515;
padding:20px;
border-radius:20px;
}

input,button{
margin:8px;
}

button{
padding:12px 18px;
border-radius:10px;
border:0;
font-weight:bold;
cursor:pointer;
}

.controls{
display:grid;
grid-template-columns:1fr;
}

canvas{
width:100%;
margin-top:20px;
background:white;
border-radius:10px;
}

label{
display:block;
margin:12px;
}

</style>

</head>


<body>


<h1>🔥 Xua Tattoo AI 🔥</h1>


<div class="app">


<p>Esténcil profesional para tatuadores</p>


<input type="file" id="upload" accept="image/*">


<div class="controls">


<label>
Contraste
<input type="range" id="contrast" min="1" max="5" value="2">
</label>


<label>
Grosor de línea
<input type="range" id="line" min="1" max="10" value="3">
</label>


<label>
Cantidad de puntos
<input type="range" id="dots" min="0" max="10" value="4">
</label>


</div>



<button onclick="crearStencil()">
CREAR ESTÉNCIL
</button>


<button onclick="limpiar()">
LIMPIAR
</button>


<button onclick="descargar()">
DESCARGAR PNG
</button>



<canvas id="canvas"></canvas>



</div>

<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let imagen=new Image();
let original=null;


document.getElementById("upload").onchange=function(e){

let lector=new FileReader();

lector.onload=function(){

imagen.onload=function(){

canvas.width=imagen.width;
canvas.height=imagen.height;

ctx.drawImage(imagen,0,0);

original=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

}

imagen.src=lector.result;

}

lector.readAsDataURL(e.target.files[0]);

}




function crearStencil(){


if(typeof cv==="undefined"){

alert("Espera que cargue el motor de imagen");
return;

}



let src=cv.imread(canvas);

let gris=new cv.Mat();

let bordes=new cv.Mat();



cv.cvtColor(
src,
gris,
cv.COLOR_RGBA2GRAY
);



// aumentar contraste

let factor=document.getElementById("contrast").value;


gris.convertTo(
gris,
-1,
factor,
0
);



// detectar líneas

cv.Canny(
gris,
bordes,
60,
140
);



// engrosar líneas

let grosor=document.getElementById("line").value;


let kernel=cv.Mat.ones(
grosor,
grosor,
cv.CV_8U
);



cv.dilate(
bordes,
bordes,
kernel
);



// invertir para transferencia

cv.bitwise_not(
bordes,
bordes
);



cv.imshow(
canvas,
bordes
);



// agregar puntos de sombra

agregarPuntos();



src.delete();
gris.delete();
bordes.delete();
kernel.delete();


}





function agregarPuntos(){


let cantidad=
document.getElementById("dots").value;


if(cantidad==0)return;


ctx.fillStyle="black";


for(
let y=0;
y<canvas.height;
y+=15
){


for(
let x=0;
x<canvas.width;
x+=15
){


let prob=Math.random();


if(prob < cantidad/20){


ctx.beginPath();

ctx.arc(
x,
y,
1.5,
0,
Math.PI*2
);

ctx.fill();


}


}


}


}




function limpiar(){


if(original){

ctx.putImageData(
original,
0,
0
);

}


}





function descargar(){


let link=document.createElement("a");

link.download=
"Xua_Tattoo_AI_Estencil.png";


link.href=
canvas.toDataURL(
"image/png"
);


link.click();


}


</script>
</body>
</html>
