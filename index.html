<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI Pro</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap');

body{
margin:0;
background:#050505;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}


h1{

font-family:'UnifrakturCook',serif;
font-size:48px;
margin:10px;

}


.sub{

color:#aaa;
letter-spacing:4px;
font-size:14px;

}


.app{

max-width:700px;
margin:auto;
background:#111;
border:1px solid #333;
border-radius:25px;
padding:25px;
box-shadow:0 0 30px #000;

}


.panel{

background:#080808;
border-radius:15px;
padding:15px;
margin:15px 0;

}



input,select{

padding:10px;
border-radius:10px;
background:#222;
color:white;

}


.crear{

width:90%;
padding:18px;
font-size:22px;
font-weight:bold;
background:#222;
color:white;
border:2px solid #777;
border-radius:15px;
cursor:pointer;

}


button{

padding:12px;
margin:5px;
border-radius:10px;
background:#1a1a1a;
color:white;
border:1px solid #555;
font-weight:bold;
cursor:pointer;

}


button:hover{

background:#333;

}


canvas{

max-width:100%;
margin-top:20px;
background:white;
border-radius:12px;

}


</style>

</head>


<body>


<h1>XUA TATTOO AI</h1>

<div class="sub">
 CREA TU ESTENCIL FACIL Y RAPIDO
 BY: JUANSEC TATTOO - XUA INK STUDIO.
</div>


<div class="app">


<div class="panel">

<h3>📷 Cargar tatuaje</h3>

<input type="file" id="foto" accept="image/*">

</div>



<div class="panel">

<h3>⚔ Modo de esténcil</h3>

<select id="modo">

<option value="linea">
🖊 Línea limpia
</option>

<option value="real">
🩶 Realista
</option>

<option value="dot">
• Dotwork
</option>

</select>

</div>



<div class="panel">

<label>
Fuerza de línea
<br>
<input type="range" id="fuerza" min="10" max="80" value="30">
</label>

<br><br>

<label>
Sombra
<br>
<input type="range" id="sombra" min="1" max="10" value="5">
</label>

</div>



<button class="crear" id="crear">
🔥 CREAR ESTÉNCIL 🔥
</button>


<br>


<button id="limpiar">
🧹 Restaurar
</button>


<button id="descargar">
💾 Descargar
</button>



<canvas id="canvas"></canvas>


</div><script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let img=new Image();
let original=null;



document.getElementById("foto").addEventListener("change",function(e){

let lector=new FileReader();

lector.onload=function(){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);


original=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

};

img.src=lector.result;

};

lector.readAsDataURL(e.target.files[0]);

});





document.getElementById("crear").addEventListener("click",function(){


if(!original){

alert("Carga un tatuaje primero");
return;

}



let datos=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


let salida=ctx.createImageData(
canvas.width,
canvas.height
);


let modo=document.getElementById("modo").value;

let fuerza=
document.getElementById("fuerza").value;


let sombra=
document.getElementById("sombra").value;



for(let y=1;y<canvas.height-1;y++){

for(let x=1;x<canvas.width-1;x++){


let p=(y*canvas.width+x)*4;


let gris=(

datos.data[p]+
datos.data[p+1]+
datos.data[p+2]

)/3;



let arriba=((y-1)*canvas.width+x)*4;
let abajo=((y+1)*canvas.width+x)*4;
let izquierda=(y*canvas.width+x-1)*4;
let derecha=(y*canvas.width+x+1)*4;



let borde=Math.abs(

gris-

(
datos.data[arriba]+
datos.data[abajo]+
datos.data[izquierda]+
datos.data[derecha]
)/4

);



let negro=false;



if(modo==="linea"){

if(borde>fuerza){

negro=true;

}

}



if(modo==="real"){

if(borde>fuerza || gris<120){

negro=true;

}

}



if(modo==="dot"){

if(gris<120 && Math.random()<sombra/10){

negro=true;

}

}




if(negro){

salida.data[p]=0;
salida.data[p+1]=0;
salida.data[p+2]=0;

}else{

salida.data[p]=255;
salida.data[p+1]=255;
salida.data[p+2]=255;

}


salida.data[p+3]=255;


}

}



ctx.putImageData(
salida,
0,
0
);


alert("Esténcil creado");


});







document.getElementById("limpiar").addEventListener("click",function(){


if(original){

ctx.putImageData(
original,
0,
0
);

}

});








document.getElementById("descargar").addEventListener("click",function(){


let link=document.createElement("a");

link.download="Xua_Tattoo_AI_Stencil.png";

link.href=canvas.toDataURL("image/png");

link.click();


});


</script>


</body>
</html>
