<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI</title>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#171717;
padding:20px;
border-radius:15px;
}

button{
padding:12px;
margin:8px;
border-radius:8px;
border:none;
font-weight:bold;
}

input{
margin:10px;
}

canvas{
max-width:100%;
margin-top:20px;
border:2px solid white;
}
</style>

</head>


<body>

<h1>🔥 Xua Tattoo AI 🔥</h1>

<div class="container">

<p>Generador profesional de esténcil</p>


<input type="file" id="file">


<br>

<label>
Grosor de línea
<input type="range" id="thick" min="1" max="10" value="3">
</label>


<br>


<button onclick="procesar()">
CREAR ESTÉNCIL
</button>


<button onclick="descargar()">
DESCARGAR
</button>


<canvas id="canvas"></canvas>


</div>



<script>


let imgElement=new Image();

let canvas=document.getElementById("canvas");

let ctx=canvas.getContext("2d");



document.getElementById("file").onchange=function(e){

let reader=new FileReader();


reader.onload=function(){

imgElement.onload=function(){

canvas.width=imgElement.width;
canvas.height=imgElement.height;

ctx.drawImage(imgElement,0,0);

}

imgElement.src=reader.result;

}

reader.readAsDataURL(e.target.files[0]);

}





function procesar(){


if(typeof cv=="undefined"){

alert("Cargando motor de imagen, espera unos segundos y prueba otra vez");

return;

}



let src=cv.imread(canvas);

let gray=new cv.Mat();

let edges=new cv.Mat();



// pasar a blanco y negro

cv.cvtColor(
src,
gray,
cv.COLOR_RGBA2GRAY
);



// detectar líneas

cv.Canny(
gray,
edges,
80,
150
);



// engrosar líneas

let size=document.getElementById("thick").value;

let kernel=cv.Mat.ones(
size,
size,
cv.CV_8U
);


cv.dilate(
edges,
edges,
kernel
);



// invertir para esténcil

cv.bitwise_not(
edges,
edges
);



cv.imshow(
canvas,
edges
);



src.delete();
gray.delete();
edges.delete();
kernel.delete();


}





function descargar(){

let link=document.createElement("a");

link.download="Xua_Tattoo_AI_Estencil.png";

link.href=canvas.toDataURL();

link.click();

}


</script>


</body>
</html>
