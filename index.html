<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xua Tattoo AI</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
padding:20px
}

.box{
max-width:600px;
margin:auto;
background:#171717;
padding:20px;
border-radius:20px
}

button,input{
margin:8px;
padding:12px;
border-radius:10px;
font-weight:bold
}

canvas{
max-width:100%;
background:white;
margin-top:20px
}
</style>
</head>

<body>

<h1>🔥 Xua Tattoo AI 🔥</h1>

<div class="box">

<input type="file" id="file" accept="image/*">

<br>

<label>Línea:
<input id="linea" type="range" min="5" max="80" value="25">
</label>

<br>

<label>Contraste:
<input id="cont" type="range" min="1" max="5" value="2">
</label>

<br>

<button onclick="stencil()">CREAR ESTÉNCIL</button>

<button onclick="invertir()">INVERTIR</button>

<button onclick="descargar()">DESCARGAR</button>

<canvas id="canvas"></canvas>

</div>


<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let img=new Image();


document.getElementById("file").onchange=function(e){

let r=new FileReader();

r.onload=function(){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

}

img.src=r.result;

}

r.readAsDataURL(e.target.files[0]);

};



function stencil(){

let w=canvas.width;
let h=canvas.height;

let data=ctx.getImageData(0,0,w,h);
let out=ctx.createImageData(w,h);

let fuerza=document.getElementById("linea").value;
let contraste=document.getElementById("cont").value;


for(let y=1;y<h-1;y++){

for(let x=1;x<w-1;x++){

let p=(y*w+x)*4;

let arriba=((y-1)*w+x)*4;
let abajo=((y+1)*w+x)*4;
let izq=(y*w+x-1)*4;
let der=(y*w+x+1)*4;


let centro=(data.data[p]+data.data[p+1]+data.data[p+2])/3;


let borde=Math.abs(
centro-
(
data.data[arriba]+
data.data[abajo]+
data.data[izq]+
data.data[der]
)/4
);


borde*=contraste;


if(borde>fuerza){

out.data[p]=0;
out.data[p+1]=0;
out.data[p+2]=0;

}else{

out.data[p]=255;
out.data[p+1]=255;
out.data[p+2]=255;

}

out.data[p+3]=255;

}

}


ctx.putImageData(out,0,0);

}



function invertir(){

let d=ctx.getImageData(0,0,canvas.width,canvas.height);

for(let i=0;i<d.data.length;i+=4){

d.data[i]=255-d.data[i];
d.data[i+1]=255-d.data[i+1];
d.data[i+2]=255-d.data[i+2];

}

ctx.putImageData(d,0,0);

}



function descargar(){

let a=document.createElement("a");

a.download="Xua_Tattoo_AI_Estencil.png";

a.href=canvas.toDataURL();

a.click();

}

</script>

</body>
</html>
