<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI</title>

<style>
body{
background:#090909;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#181818;
padding:20px;
border-radius:20px;
max-width:600px;
margin:auto;
}

button{
padding:12px;
margin:6px;
border-radius:10px;
font-weight:bold;
}

canvas{
max-width:100%;
background:white;
margin-top:20px;
}
</style>
</head>

<body>

<h1>🔥 Xua Tattoo AI 🔥</h1>

<div class="box">

<input type="file" id="file">

<br>

<button onclick="crearStencil()">CREAR ESTÉNCIL</button>

<button onclick="dotwork()">DOTWORK</button>

<button onclick="invertir()">INVERTIR</button>

<button onclick="descargar()">DESCARGAR</button>


<canvas id="canvas"></canvas>

</div>


<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let img=new Image();


document.getElementById("file").onchange=function(e){

let r=new FileReader();

r.onload=function(){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

}

img.src=r.result;

}

r.readAsDataURL(e.target.files[0]);

};





function crearStencil(){

let w=canvas.width;
let h=canvas.height;

let original=ctx.getImageData(0,0,w,h);

let salida=ctx.createImageData(w,h);



for(let y=1;y<h-1;y++){

for(let x=1;x<w-1;x++){


let p=(y*w+x)*4;

let a=((y-1)*w+x)*4;
let b=((y+1)*w+x)*4;
let i=(y*w+x-1)*4;
let d=(y*w+x+1)*4;


let centro=
(
original.data[p]+
original.data[p+1]+
original.data[p+2]
)/3;


let cambio=Math.abs(
centro-
(
original.data[a]+
original.data[b]+
original.data[i]+
original.data[d]
)/4
);



if(cambio>15){

salida.data[p]=0;
salida.data[p+1]=0;
salida.data[p+2]=0;

}else{

salida.data[p]=255;
salida.data[p+1]=255;
salida.data[p+2]=255;

}

salida.data[p+3]=255;

}

}


ctx.putImageData(salida,0,0);

}




function dotwork(){

let datos=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


ctx.fillStyle="black";


for(let y=0;y<canvas.height;y+=12){

for(let x=0;x<canvas.width;x+=12){

let p=(y*canvas.width+x)*4;


if(datos.data[p]<80 && Math.random()>0.65){

ctx.beginPath();

ctx.arc(
x,
y,
1.2,
0,
Math.PI*2
);

ctx.fill();

}

}

}

}




function invertir(){

let d=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


for(let i=0;i<d.data.length;i+=4){

d.data[i]=255-d.data[i];
d.data[i+1]=255-d.data[i+1];
d.data[i+2]=255-d.data[i+2];

}


ctx.putImageData(d,0,0);

}



function descargar(){

let a=document.createElement("a");

a.download="Xua_Tattoo_AI_Estencil.png";

a.href=canvas.toDataURL();

a.click();

}

</script>

</body>
</html>
