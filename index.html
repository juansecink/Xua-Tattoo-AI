<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI Pro</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap');

body{
margin:0;
background:#050505;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}


h1{
font-family:'UnifrakturCook',serif;
font-size:48px;
margin:10px;
}


.sub{
color:#aaa;
letter-spacing:4px;
}


.app{

max-width:700px;
margin:auto;
background:#111;
border:1px solid #333;
border-radius:25px;
padding:25px;

}


.panel{

background:#080808;
padding:15px;
margin:15px 0;
border-radius:15px;

}


select,input{

padding:10px;
background:#222;
color:white;
border-radius:10px;

}


.crear{

width:90%;
padding:20px;
font-size:22px;
font-weight:bold;
background:#222;
color:white;
border:2px solid #777;
border-radius:15px;

}


button{

padding:12px;
margin:5px;
background:#181818;
color:white;
border:1px solid #555;
border-radius:10px;
font-weight:bold;

}


#estado{

color:#aaa;
margin:15px;

}


canvas{

max-width:100%;
background:white;
margin-top:20px;
border-radius:12px;

}


</style>

</head>


<body>


<h1>XUA TATTOO AI</h1>

<div class="sub">
PRO STENCIL ENGINE
</div>



<div class="app">



<div class="panel">

<h3>📷 Imagen</h3>

<input type="file" id="foto" accept="image/*">

</div>




<div class="panel">

<h3>⚔ Tipo de esténcil</h3>


<select id="modo">

<option value="linea">
🖊 Línea profesional
</option>

<option value="real">
🩶 Realista
</option>

<option value="dot">
• Dotwork
</option>


</select>


</div>




<div class="panel">

Detalle

<br>

<input type="range" id="detalle" min="5" max="80" value="25">


<br><br>


Sombra

<br>

<input type="range" id="sombra" min="1" max="10" value="5">


</div>




<button class="crear" id="crear">

🔥 CREAR ESTÉNCIL 🔥

</button>


<div id="estado">
Esperando imagen...
</div>



<button id="limpiar">
🧹 Restaurar
</button>


<button id="descargar">
💾 Descargar
</button>



<canvas id="canvas"></canvas>


</div><script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let imagen=new Image();
let original=null;



const estado=document.getElementById("estado");



document.getElementById("foto").addEventListener("change",function(e){

let lector=new FileReader();


lector.onload=function(){

imagen.onload=function(){

canvas.width=imagen.width;
canvas.height=imagen.height;


ctx.drawImage(imagen,0,0);


original=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


estado.innerHTML="Imagen cargada";

};


imagen.src=lector.result;

};


lector.readAsDataURL(e.target.files[0]);

});






document.getElementById("crear").addEventListener("click",function(){


if(!original){

estado.innerHTML="Carga una imagen primero";
return;

}



estado.innerHTML="Creando esténcil...";



setTimeout(function(){


let entrada=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


let salida=ctx.createImageData(
canvas.width,
canvas.height
);



let modo=document.getElementById("modo").value;


let detalle=
Number(document.getElementById("detalle").value);


let sombra=
Number(document.getElementById("sombra").value);



for(let y=1;y<canvas.height-1;y++){

for(let x=1;x<canvas.width-1;x++){


let p=(y*canvas.width+x)*4;



let gris=(

entrada.data[p]+
entrada.data[p+1]+
entrada.data[p+2]

)/3;



let vecinos=[

((y-1)*canvas.width+x)*4,
((y+1)*canvas.width+x)*4,
(y*canvas.width+x-1)*4,
(y*canvas.width+x+1)*4

];



let promedio=0;


for(let v of vecinos){

promedio+=(

entrada.data[v]+
entrada.data[v+1]+
entrada.data[v+2]

)/3;

}


promedio/=4;



let borde=Math.abs(
gris-promedio
);



let negro=false;



// LINEAS
if(modo==="linea"){

if(borde>detalle){

negro=true;

}

}



// REALISTA

if(modo==="real"){

if(borde>detalle-8 || gris<100){

negro=true;

}

}



// DOTWORK

if(modo==="dot"){

if(gris<160){

if(Math.random()<(sombra/10)){

negro=true;

}

}

}



// negros profundos

if(gris<45){

negro=true;

}




if(negro){

salida.data[p]=0;
salida.data[p+1]=0;
salida.data[p+2]=0;

}else{

salida.data[p]=255;
salida.data[p+1]=255;
salida.data[p+2]=255;

}


salida.data[p+3]=255;



}

}



ctx.putImageData(
salida,
0,
0
);



estado.innerHTML="✅ Esténcil terminado";


},100);


});







document.getElementById("limpiar").addEventListener("click",function(){


if(original){

ctx.putImageData(
original,
0,
0
);

estado.innerHTML="Imagen restaurada";

}

});







document.getElementById("descargar").addEventListener("click",function(){


let enlace=document.createElement("a");


enlace.download="Xua_Tattoo_AI_Stencil.png";


enlace.href=canvas.toDataURL("image/png");


enlace.click();


});



</script>


</body>
</html>
