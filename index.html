<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI</title>

<style>
body{
background:#080808;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.app{
max-width:600px;
margin:auto;
background:#161616;
padding:20px;
border-radius:20px;
}

button{
padding:12px 20px;
margin:8px;
border:0;
border-radius:10px;
font-weight:bold;
}

input{
margin:10px;
}

canvas{
max-width:100%;
margin-top:20px;
background:white;
border-radius:10px;
}
</style>

</head>

<body>

<h1>🔥 Xua Tattoo AI 🔥</h1>

<div class="app">

<p>Generador de esténcil profesional</p>

<input type="file" id="foto" accept="image/*">

<br>

<label>
Grosor de línea
<input type="range" id="grosor" min="1" max="8" value="3">
</label>

<br>

<label>
Contraste
<input type="range" id="contraste" min="1" max="5" value="2">
</label>

<br>

<button id="crear">
CREAR ESTÉNCIL
</button>

<button id="descargar">
DESCARGAR
</button>

<br>

<canvas id="lienzo"></canvas>

</div>


<script>

let canvas=document.getElementById("lienzo");
let ctx=canvas.getContext("2d");

let imagen=new Image();


document.getElementById("foto").onchange=function(e){

let archivo=e.target.files[0];

let lector=new FileReader();


lector.onload=function(){

imagen.onload=function(){

canvas.width=imagen.width;
canvas.height=imagen.height;

ctx.drawImage(imagen,0,0);

};

imagen.src=lector.result;

};

lector.readAsDataURL(archivo);

};





document.getElementById("crear").onclick=function(){

if(!imagen.src){

alert("Primero sube una imagen");

return;

}


let datos=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


let contraste=
document.getElementById("contraste").value;


for(let i=0;i<datos.data.length;i+=4){

let gris=
(
datos.data[i]+
datos.data[i+1]+
datos.data[i+2]
)/3;


gris=(gris-128)*contraste+128;


if(gris<150){

datos.data[i]=0;
datos.data[i+1]=0;
datos.data[i+2]=0;

}else{

datos.data[i]=255;
datos.data[i+1]=255;
datos.data[i+2]=255;

}


}


ctx.putImageData(datos,0,0);



// engrosar puntos negros

let grosor=
document.getElementById("grosor").value;


ctx.globalCompositeOperation="source-over";


let copia=document.createElement("canvas");

copia.width=canvas.width;
copia.height=canvas.height;

let c=copia.getContext("2d");

c.drawImage(canvas,0,0);


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);


for(let x=-grosor;x<=grosor;x++){

for(let y=-grosor;y<=grosor;y++){

ctx.drawImage(
copia,
x,
y
);

}

}


alert("Esténcil creado");

};





document.getElementById("descargar").onclick=function(){

let enlace=document.createElement("a");

enlace.download="Xua_Tattoo_AI_Estencil.png";

enlace.href=canvas.toDataURL();

enlace.click();

};


</script>


</body>
</html>
