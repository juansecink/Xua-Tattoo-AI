<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xua Tattoo AI</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
font-size:35px;
}

.box{
background:#1b1b1b;
padding:20px;
border-radius:15px;
max-width:500px;
margin:auto;
}

button{
background:white;
color:black;
border:0;
padding:14px;
margin:8px;
border-radius:10px;
font-weight:bold;
}

input{
margin:15px;
}

canvas{
display:none;
}

img{
max-width:95%;
margin-top:20px;
border:2px solid white;
}

label{
display:block;
margin-top:15px;
}

</style>

</head>


<body>

<h1>🔥 Xua Tattoo AI 🔥</h1>

<div class="box">

<p>Generador profesional de esténcil para tatuajes</p>


<input type="file" id="upload" accept="image/*">


<label>
Oscurecer líneas:
<input type="range" id="dark" min="0" max="255" value="120">
</label>


<label>
Puntos de sombra:
<input type="range" id="dots" min="0" max="10" value="4">
</label>


<br>


<button onclick="crearStencil()">
CREAR ESTÉNCIL
</button>


<button onclick="descargar()">
DESCARGAR PNG
</button>


<img id="resultado">


</div>


<canvas id="canvas"></canvas>



<script>

let imagen=new Image();

let canvas=document.getElementById("canvas");

let ctx=canvas.getContext("2d");

let resultado=document.getElementById("resultado");



document.getElementById("upload").onchange=function(e){

let archivo=e.target.files[0];

let lector=new FileReader();


lector.onload=function(){

imagen.onload=function(){

resultado.src=imagen.src;

}


imagen.src=lector.result;

}


lector.readAsDataURL(archivo);

}





function crearStencil(){


canvas.width=imagen.width;

canvas.height=imagen.height;


ctx.drawImage(imagen,0,0);



let datos=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);



let intensidad=
document.getElementById("dark").value;



for(let i=0;i<datos.data.length;i+=4){


let brillo=
(datos.data[i]+datos.data[i+1]+datos.data[i+2])/3;



if(brillo<intensidad){

datos.data[i]=0;
datos.data[i+1]=0;
datos.data[i+2]=0;

}else{

datos.data[i]=255;
datos.data[i+1]=255;
datos.data[i+2]=255;

}


}



ctx.putImageData(datos,0,0);



crearPuntos();



resultado.src=canvas.toDataURL();

}





function crearPuntos(){


let cantidad=
document.getElementById("dots").value;


ctx.fillStyle="black";


for(let y=0;y<canvas.height;y+=20){


for(let x=0;x<canvas.width;x+=20){


if(Math.random()<cantidad/20){

ctx.beginPath();

ctx.arc(
x,
y,
2,
0,
Math.PI*2
);

ctx.fill();


}


}


}


}




function descargar(){


let enlace=document.createElement("a");

enlace.download="Xua_Tattoo_AI_Estencil.png";

enlace.href=canvas.toDataURL();

enlace.click();


}


</script>


</body>
</html>
